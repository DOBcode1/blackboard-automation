<div class="card">
  <div class="card-course">
    <span class="course-dot" style="background: {{ item.course_color }};"></span>
    <span class="course-name">{{ item.course_name }}</span>
  </div>
  <div class="card-title">{{ item.title }}</div>
  {% if item.due_date_resolved %}
  <div class="card-meta"><span class="label">Resolved as</span>{{ item.due_date_resolved }}</div>
  {% endif %}
  {% if item.due_date_raw %}
  <div class="card-meta"><span class="label">As written</span>{{ item.due_date_raw }}</div>
  {% endif %}
  {% if item.confidence_score is not none %}
  <div class="card-meta"><span class="label">Confidence</span>{{ item.confidence_score }}/5</div>
  {% endif %}
  <div class="card-actions">
    <button class="btn-primary btn-sm add-to-cal-btn"
            data-id="{{ item.id }}"
            data-title="{{ item.title | e }}"
            data-due="{{ (item.due_date_resolved or '') | e }}"
            data-type="{{ (item.type or '') | e }}"
            data-flag="{{ (item.flag_reason or '') | e }}"
            data-user-edited="{{ 'true' if item.user_edited else 'false' }}"
    >{% if item.flag_reason == 'outside_semester_window' %}Confirm date{% else %}Add to calendar{% endif %}</button>
    <button class="btn-text btn-sm dismiss-btn"
            data-id="{{ item.id }}"
    >Dismiss</button>
  </div>
</div>
